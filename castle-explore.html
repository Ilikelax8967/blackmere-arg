<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackmere Castle - Exploration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0f;
    color: #ccc;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.9;
    font-size: 16px;
  }

  #game-container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 30px 60px;
    min-height: 100vh;
    position: relative;
  }

  /* Scene transitions */
  .scene {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .scene.active {
    opacity: 1;
    transform: translateY(0);
  }
  .scene.fading {
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* Scene title */
  .scene-title {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 24px;
    letter-spacing: 2px;
    border-left: 3px solid #666;
    padding-left: 14px;
  }

  /* Narration */
  .narration {
    color: #999;
    font-style: italic;
    margin-bottom: 18px;
    font-size: 15.5px;
    text-indent: 2em;
  }

  .narration-normal {
    color: #bbb;
    margin-bottom: 18px;
    font-size: 15.5px;
    text-indent: 2em;
  }

  /* Dialogue */
  .dialogue {
    margin: 16px 0 16px 20px;
    padding: 12px 18px;
    border-left: 3px solid #666;
    font-size: 15.5px;
    position: relative;
  }
  .dialogue::before {
    content: attr(data-speaker);
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    font-style: italic;
  }

  .dialogue-suoxiao { border-left-color: #9b59b6; color: #c8a2d8; }
  .dialogue-suoxiao::before { color: #9b59b6; }

  .dialogue-linwan { border-left-color: #e84393; color: #f0a0c4; }
  .dialogue-linwan::before { color: #e84393; }

  .dialogue-baixue { border-left-color: #a29bfe; color: #c8c4f8; }
  .dialogue-baixue::before { color: #a29bfe; }

  .dialogue-unknown { border-left-color: #d63031; color: #e88080; }
  .dialogue-unknown::before { color: #d63031; }

  .dialogue-chenmo { border-left-color: #636e72; color: #a0a0a0; }
  .dialogue-chenmo::before { color: #636e72; }

  .dialogue-system { border-left-color: #f39c12; color: #e0c080; }
  .dialogue-system::before { color: #f39c12; }

  /* Diary entry */
  .diary-entry {
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 18px 22px;
    margin: 20px 0;
    font-family: "KaiTi", "STKaiti", serif;
    color: #b8a88a;
    font-size: 15px;
    line-height: 2;
    position: relative;
  }
  .diary-entry::before {
    content: attr(data-label);
    display: block;
    text-align: center;
    color: #8a7a5a;
    font-size: 13px;
    margin-bottom: 12px;
    letter-spacing: 4px;
  }

  /* Clue discovered */
  .clue-discovered {
    background: rgba(46, 204, 113, 0.08);
    border: 1px solid rgba(46, 204, 113, 0.3);
    border-radius: 4px;
    padding: 12px 18px;
    margin: 16px 0;
    color: #5ddb92;
    font-size: 14px;
    animation: clueFlash 2s ease;
  }
  .clue-discovered::before {
    content: "[ 获得线索 ] ";
    font-weight: bold;
  }

  @keyframes clueFlash {
    0% { background: rgba(46, 204, 113, 0.2); }
    100% { background: rgba(46, 204, 113, 0.08); }
  }

  /* Sound effect text */
  .sfx {
    color: #666;
    font-size: 13px;
    letter-spacing: 3px;
    text-align: center;
    margin: 20px 0;
    font-family: monospace;
  }

  /* Choices */
  .choices-container {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid #555;
    color: #ddd;
    padding: 14px 24px;
    font-size: 15px;
    cursor: pointer;
    text-align: left;
    border-radius: 4px;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .choice-btn:hover {
    border-color: #9b59b6;
    color: #fff;
    background: rgba(155, 89, 182, 0.08);
    padding-left: 30px;
  }
  .choice-btn:active {
    background: rgba(155, 89, 182, 0.15);
  }
  .choice-btn.locked {
    border-color: #333;
    color: #555;
    cursor: not-allowed;
  }
  .choice-btn.locked:hover {
    border-color: #333;
    color: #555;
    background: transparent;
    padding-left: 24px;
  }

  /* Clue panel */
  #clue-panel-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid #444;
    color: #aaa;
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    z-index: 100;
    font-family: inherit;
    transition: all 0.3s ease;
  }
  #clue-panel-btn:hover {
    border-color: #888;
    color: #fff;
  }

  #clue-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    overflow-y: auto;
  }
  #clue-panel.open { display: flex; justify-content: center; padding: 60px 20px; }
  #clue-panel-inner {
    max-width: 600px;
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 30px;
  }
  #clue-panel h2 {
    color: #fff;
    font-size: 18px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #333;
  }
  .clue-item {
    padding: 12px 0;
    border-bottom: 1px solid #1a1a1a;
    color: #999;
    font-size: 14px;
  }
  .clue-item:last-child { border-bottom: none; }
  .clue-item .clue-name {
    color: #5ddb92;
    font-weight: bold;
    margin-bottom: 4px;
  }
  #close-clue-panel {
    margin-top: 20px;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    border-radius: 4px;
    transition: all 0.3s;
  }
  #close-clue-panel:hover { border-color: #888; color: #fff; }

  /* Ending screen */
  .ending-screen {
    text-align: center;
    padding-top: 20px;
  }
  .ending-screen .ending-title {
    font-size: 26px;
    color: #fff;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  .ending-screen .ending-subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }
  .ending-screen .ending-text {
    text-align: left;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 24px 0;
  }

  /* Restart */
  .restart-btn {
    margin-top: 30px;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    padding: 12px 30px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    border-radius: 4px;
    transition: all 0.3s;
  }
  .restart-btn:hover { border-color: #888; color: #fff; }

  .return-link {
    display: inline-block;
    margin-top: 16px;
    color: #666;
    font-size: 13px;
    text-decoration: none;
    transition: color 0.3s;
  }
  .return-link:hover { color: #aaa; }

  /* Hint text */
  .hint-text {
    color: #555;
    font-size: 12px;
    text-align: center;
    margin-top: 8px;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="scene-display" class="scene active"></div>
</div>

<button id="clue-panel-btn" onclick="toggleCluePanel()">&#128270; 线索 (<span id="clue-count">0</span>)</button>

<div id="clue-panel">
  <div id="clue-panel-inner">
    <h2>已收集线索</h2>
    <div id="clue-list"></div>
    <button id="close-clue-panel" onclick="toggleCluePanel()">关闭</button>
  </div>
</div>

<script>
// ========== Global State ==========
var collectedClues = [];
var cluePanelOpen = false;
var visitedScenes = {};
var totalSteps = 0;
var MAX_STEPS_FOR_LOST = 60;

// ========== Clue System ==========
function hasClue(name) {
  for (var i = 0; i < collectedClues.length; i++) {
    if (collectedClues[i].name === name) return true;
  }
  return false;
}

function addClue(name, desc) {
  if (hasClue(name)) return;
  collectedClues.push({ name: name, desc: desc });
  document.getElementById('clue-count').textContent = collectedClues.length;
}

function toggleCluePanel() {
  cluePanelOpen = !cluePanelOpen;
  var panel = document.getElementById('clue-panel');
  if (cluePanelOpen) {
    var listHtml = '';
    if (collectedClues.length === 0) {
      listHtml = '<div style="color:#555;text-align:center;padding:20px;">尚未发现任何线索。</div>';
    } else {
      for (var i = 0; i < collectedClues.length; i++) {
        listHtml += '<div class="clue-item"><div class="clue-name">' + (i+1) + '. ' + collectedClues[i].name + '</div><div>' + collectedClues[i].desc + '</div></div>';
      }
    }
    document.getElementById('clue-list').innerHTML = listHtml;
    panel.classList.add('open');
  } else {
    panel.classList.remove('open');
  }
}

// ========== Scene Rendering ==========
function renderScene(sceneId) {
  totalSteps++;
  visitedScenes[sceneId] = true;

  var container = document.getElementById('scene-display');
  container.classList.add('fading');
  container.classList.remove('active');

  setTimeout(function() {
    var html = buildSceneHTML(sceneId);
    if (html === null) return;
    container.innerHTML = html;
    container.classList.remove('fading');
    void container.offsetWidth;
    container.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 500);
}

function buildSceneHTML(sceneId) {
  var s = scenes[sceneId];
  if (!s) return '<p style="color:#666;text-align:center;margin-top:40vh;">[场景数据丢失]</p>';

  var html = '';
  if (s.isEnding) {
    html += '<div class="ending-screen">';
    html += '<div class="ending-title">' + (s.endingTitle || '') + '</div>';
    html += '<div class="ending-subtitle">' + (s.endingSubtitle || '') + '</div>';
    html += '<div class="ending-text">';
  }

  if (s.title) {
    html += '<div class="scene-title">' + s.title + '</div>';
  }

  for (var i = 0; i < s.content.length; i++) {
    var block = s.content[i];
    if (block.type === 'narration') {
      html += '<p class="narration">' + block.text + '</p>';
    } else if (block.type === 'normal') {
      html += '<p class="narration-normal">' + block.text + '</p>';
    } else if (block.type === 'dialogue') {
      html += '<div class="dialogue dialogue-' + block.cls + '" data-speaker="' + block.speaker + '">' + block.text + '</div>';
    } else if (block.type === 'diary') {
      html += '<div class="diary-entry" data-label="' + (block.label || '-- 日记摘录 --') + '">' + block.text + '</div>';
    } else if (block.type === 'clue') {
      html += '<div class="clue-discovered">' + block.text + '</div>';
    } else if (block.type === 'divider') {
      html += '<hr class="divider">';
    } else if (block.type === 'sfx') {
      html += '<div class="sfx">' + block.text + '</div>';
    }
  }

  if (s.choices && s.choices.length > 0) {
    html += '<div class="choices-container">';
    for (var j = 0; j < s.choices.length; j++) {
      var ch = s.choices[j];
      var locked = ch.requireClue && !hasClue(ch.requireClue);
      var cls = locked ? 'choice-btn locked' : 'choice-btn';
      var onclick = locked ? '' : ' onclick="renderScene(\'' + ch.target + '\')"';
      var extra = locked ? ' [需要线索: ' + ch.requireClue + ']' : '';
      html += '<button class="' + cls + '"' + onclick + '>' + ch.text + extra + '</button>';
    }
    html += '</div>';
    if (s.hint) {
      html += '<div class="hint-text">' + s.hint + '</div>';
    }
  }

  if (s.isEnding) {
    html += '</div>';
    html += '<div style="text-align:center">';
    html += '<button class="restart-btn" onclick="restartGame()">重新开始</button>';
    html += '<br><a class="return-link" href="mystery-site.html">返回神秘网站</a>';
    html += '</div></div>';
  }

  return html;
}

function restartGame() {
  collectedClues = [];
  visitedScenes = {};
  totalSteps = 0;
  document.getElementById('clue-count').textContent = '0';
  renderScene('entrance');
}

// ========== Scenes ==========
var scenes = {};

// ===================================================================
// SCENE 1: ENTRANCE - The Castle Gate
// ===================================================================
scenes['entrance'] = {
  title: '古堡大门',
  content: [
    { type: 'sfx', text: '-- [风声: 呼啸的寒风穿过铁门的缝隙] --' },
    { type: 'normal', text: '你站在一座古堡的大门前。' },
    { type: 'narration', text: '铁门半开着，锈迹斑斑的铰链发出令人牙酸的声响。门柱上的石狮子缺了一只头，另一只的眼睛是空的，像两个黑色的窟窿在盯着你。月亮被厚重的云层遮住了，只有偶尔的闪电能照亮古堡的全貌——一座灰黑色的庞然大物，窗户大多碎了，黑洞洞的窗口像无数张张开的嘴。' },
    { type: 'normal', text: '你是从那个网站上点进来的。那个"进入古堡"的按钮。你以为这只是某种网页特效，或者一个恐怖解谜游戏的入口。但现在，你能感觉到脚下的碎石路是真实的，空气里的寒意是真实的，风刮过你面颊时那种刺痛感也是真实的。' },
    { type: 'narration', text: '你不记得自己是怎么到这里来的。手机还在口袋里，你掏出来看了一眼——没有信号，时间是23:47。屏幕上还停留在那个网站，"进入古堡"按钮变成了灰色，上面多了一行小字："您已进入。祝您好运。"' },
    { type: 'normal', text: '你把手机塞回口袋。铁门的那一边，古堡内部隐约透出一丝光。不是电灯的光——更像是烛火。' },
    { type: 'narration', text: '风又吹过来了。这一次，你隐约听到了风声里夹杂着什么——不是自然的声音。像是有人在很远的地方叫你的名字。但太远了，远到也许只是你的幻觉。' }
  ],
  choices: [
    { text: '推开铁门，走进古堡', target: 'foyer' },
    { text: '先在门口观察一会儿', target: 'entrance_look' },
    { text: '转身离开——这地方不对劲', target: 'entrance_leave' }
  ]
};

// ===================================================================
// SCENE 1B: Entrance - Look around
// ===================================================================
scenes['entrance_look'] = {
  title: '古堡大门前',
  content: [
    { type: 'normal', text: '你没有急着进去。你蹲下来，借着手电筒的光看了看铁门附近的地面。' },
    { type: 'narration', text: '地面上有车辙印。是很新的，轮胎纹路清晰。有人最近开车来过这里——或者是被带到这里。车辙延伸到古堡右侧的某个方向消失了，你跟着照过去，发现了一辆黑色的轿车停在灌木丛后面。车灯灭了，引擎盖还是温热的。' },
    { type: 'normal', text: '你拉开了驾驶座的车门——空的。副驾驶也空的。但后座上有一个帆布包，拉链半开着。你往里看了看：一瓶矿泉水（喝了一半）、一个充电宝、一叠打印出来的A4纸。' },
    { type: 'narration', text: '你抽出那叠A4纸。上面是一份打印的聊天记录——手机截屏。你看了看内容，心跳加速了。' },
    { type: 'normal', text: '聊天记录的两个人，一个备注名叫"阿榕"，另一个没有备注，只有一串号码。对话内容是——' },
    { type: 'dialogue', cls: 'system', speaker: '[聊天记录]', text: '阿榕: 你确定要一个人去？那个地方我查过了，很不正常。\n没有备注: 我必须去。陈陌在那里面。我收到他最后一条消息之后就再也没了。\n阿榕: 万一他在骗你呢？\n没有备注: 他不会骗我。你认识他多久了？\n阿榕: ……三年。\n没有备注: 那你应该知道，他宁可死也不会骗我。' },
    { type: 'narration', text: '聊天记录到这里就断了。没有备注的那个人，从语气和用词来看，像是一个女性。而她提到了陈陌——' },
    { type: 'normal', text: '你把A4纸塞回帆布包。林晚。这辆车应该是林晚的。她来过这里，但她现在不在车里。' },
    { type: 'clue', text: '林晚的车——古堡外停着一辆黑色轿车，后座有林晚的帆布包和聊天记录，证明她确实来过古堡。聊天记录显示她是为了找陈陌才来的。' },
    { type: 'narration', text: '铁门那边，烛火的光更亮了一些。像是在催促你。' }
  ],
  choices: [
    { text: '推门进入古堡', target: 'foyer' },
    { text: '绕着古堡外围走走看看有没有别的入口', target: 'entrance_side' }
  ]
};

// ===================================================================
// SCENE 1C: Entrance - Side exploration
// ===================================================================
scenes['entrance_side'] = {
  title: '古堡外围',
  content: [
    { type: 'normal', text: '你沿着古堡的外墙走了一圈。古堡比你想象的要大得多，几乎占了半个山头。北侧的墙壁上有一排被木板封住的窗户，东面是一座坍塌了一半的温室，玻璃碎片在月光下闪闪发亮。' },
    { type: 'narration', text: '你转到古堡的南面时，脚下一软——地面塌了一块，露出下面的空洞。你赶紧后退了两步，用手电筒往里面照了照。' },
    { type: 'normal', text: '是一个废弃的通风管道，直径大约半米，从古堡的地基下面延伸出去。管道内壁长满了青苔和霉菌，空气里弥漫着一股潮湿的泥土味。最深处隐约有微弱的光——不是外面的光，是从古堡内部透出来的。' },
    { type: 'narration', text: '这个管道太窄了，你不确定能不能爬得进去。但如果你想的话，这倒是一条……备用的路。' },
    { type: 'clue', text: '通风管道——古堡南侧地面下有一条废弃的通风管道，连接古堡内部。管道很窄，可以作为紧急出口。' }
  ],
  choices: [
    { text: '记住这条路，还是从正门进去吧', target: 'foyer' },
    { text: '试试能不能从管道爬进去', target: 'foyer_via_pipe' }
  ]
};

// ===================================================================
// SCENE 1D: Entrance - Try to leave
// ===================================================================
scenes['entrance_leave'] = {
  title: '',
  content: [
    { type: 'normal', text: '你转身准备离开。你走了大概十步——' },
    { type: 'sfx', text: '-- [铁门发出一声尖锐的金属摩擦声] --' },
    { type: 'narration', text: '你回头看了一眼。铁门正在缓缓合上。但没有人推它。你加速往前跑，又跑了二十步、三十步——你发现不对。来时的碎石路消失了。你脚下变成了柔软的草地，然后是泥土，然后是沙子。你不知道自己什么时候偏离了路。' },
    { type: 'normal', text: '你停下脚步。四周一片漆黑，什么也看不见。你打开手电筒——光照不到任何有意义的东西，只有无尽的黑暗。' },
    { type: 'dialogue', cls: 'unknown', speaker: '???', text: '"你已经进来了。进来了就出不去。"' },

    { type: 'diary', text: '1949年 冬。\n\n周祁给了我一本古书。很旧了，纸页发脆，像是手抄的。书里记载了一种古老的绘画方法——把一个人的灵魂固定在画布上。具体做法是：画师在画布上画下那个人的肖像，使用特定的颜料配方。当肖像完成的那一刻，被画的人会失去意识，而他们的灵魂会进入画中。\n\n画中的人不会老、不会死。他们会永远留在那里。\n\n我以为这是胡说八道。但周祁说，他可以证明。', label: "-- 日记 第二篇 --" },
    { type: 'diary', text: '1950年 春。\n\n他证明了。\n\n画的是他的管家老张。一个六十多岁的老人，身体越来越差，自己说活不过年底了。老张自愿的。他说如果能在画里永生，总比在土里烂掉好。\n\n我画了他。用了整整三天。第三天晚上，我画完了最后一笔——他的眼睛。\n\n老张就那样倒在了椅子上。像是睡着了。我摸了摸他的脉搏——没有。\n\n但画布上的老张睁开了眼睛。他看着我，笑了。嘴唇动了动，但说不出声音。\n\n我没有尖叫。也许是因为太震惊了，反而叫不出来。周祁站在旁边，很平静。他说："这就是永生。"', label: "-- 日记 第三篇 --" },
    { type: 'diary', text: '1950年 秋。\n\n我已经画了很多人了。周祁的朋友、他的商业伙伴、甚至他的弟弟。他们来了，坐在我的画架前，我画他们。画完之后，他们就不动了。\n\n周祁告诉他们这是"永生"。他告诉他们画里才是永恒的乐园。他们都信了。或者说，他们假装信了，因为他们没有别的选择。\n\n林淑芬不信。她是周祁的妻子。她来找我的时候脸都是白的，说周祁变了，说他把所有人都"处理"掉了，说下一个就轮到她了。\n\n我什么也没说。因为我正在画她。', label: "-- 日记 第四篇 --" },
    { type: 'diary', text: '1951年 夏。\n\n林淑芬的画完成了。画中的她很美，比活着的时候更美。但她的表情是恐惧的——她被画进去的那一刻意识到了正在发生什么，但来不及了。\n\n那天晚上我哭了很久。周祁不理解我为什么要哭。他说他们都去了更好的地方。我说画里算什么更好的地方。他说，至少他们还在。\n\n"至少他们还在"——这句话后来我想了很多年。', label: "-- 日记 第五篇 --" },
    { type: 'diary', text: '1952年 冬。\n\n周祁死了。不是被我画的——是他自己要求的。他说他想进画里陪我。他说他不想让我一个人。七十年的寿命他嫌太短了。\n\n我画了他。他微笑着闭上了眼睛。他的画是我所有作品里最好的。', label: "-- 日记 第六篇 --" },
    { type: 'diary', text: '1952年 冬（续）。\n\n画完周祁之后，我意识到一件事：我也被困住了。\n\n我试过画自己。三次。每一次画到一半画布就会燃烧起来——不是普通的火，是蓝色的，从颜料本身烧起来的。自画像是禁忌。规则不允许。\n\n我需要另一个人来替我画。但这个世界上，还有谁会来这座荒废的古堡呢？\n\n周祁说会有人的。他说得那么笃定，像是在预言什么。我问他为什么这么确定。他只是笑了笑。\n\n我现在明白了他为什么笑。他知道我有很多时间来等。\n\n但七十七年还是很长。长得我不知道自己还是不是"活着"。', label: "-- 日记 第七篇 --" },
    { type: 'divider' },
    { type: 'normal', text: '你快速翻到最后几页。纸张变新了，日期间隔变短。字迹也开始变化——从工整到急促，再到……颤抖。' },
    { type: 'diary', text: '2026年 6月。\n\n终于。七十七年后，终于有人要来了。\n\n是周祁安排的——不，是周祁在七十七年前安排的。他留下了一些东西，一些能让后来的时代找到这座古堡的东西。那个网站、那些文件、那些刻意留下的线索——都是他的遗产。他说过，"时间会带来画家"。\n\n来了三个人。陈陌、林晚、还有一个……苏晓。\n\n陈陌最合适。他有绘画天赋——周祁选中的人都有艺术天赋。他会成为我的画师。\n\n但陈陌很聪明。他到了B区之后就开始怀疑了。他检查了那些画，翻了那些旧书。我不得不加快速度。在22:10，我把他的灵魂固定在了画布上。他挣扎了一下，但很快就不动了。\n\n他的表情是困惑的。始终是困惑的。我画了那个表情，因为那是真的。\n\n他死前看了一眼画架上我的自画像。那双空白的眼睛。他好像明白了什么。\n\n但这不重要了。重要的是，我需要处理苏晓。', label: "-- 日记 最后一篇 --" },
    { type: 'diary', text: '苏晓的身体很好。我在来古堡的路上就完成了附身。她的灵魂很弱——不，不是弱，是太天真了。她根本没有意识到自己已经不是自己了。\n\n我用苏晓的手机给陈陌发了消息。每一条都是精心设计的。"你来了吗"、"他了解的比你想象的多"……每一条都在引导他深入，让他的恐惧和好奇同时上升，让他在正确的时间到达正确的地方。\n\n但苏晓的脸和声音还是不够。我需要的是你——那个会画画的人。苏晓只是一个工具，一个让你来到这里的理由。\n\n现在你在读这篇日记。这说明你已经知道了真相。很好。\n\n来找我。在三楼。最里面的那个房间。\n\n我有最后一个请求。', label: "-- 日记 最后一篇（续） --" },
    { type: 'divider' },
    { type: 'sfx', text: '-- [音效: 画室外传来轻微的脚步声，又很快消失了] --' },
    { type: 'narration', text: '日记从你手中滑落。你的手在发抖。不是因为冷。' },
    { type: 'normal', text: '你想起了所有的那些消息。苏晓发的每一条消息——"阿榕已经都跟我说了"、"陈陌的了解比你想象的多"——那些语气不太对劲的句子。你以为那只是她的性格。现在你知道了，那些话背后是白雪，一个困在古堡里七十多年的灵魂，用苏晓的口吻精心编写的剧本。' },
    { type: 'normal', text: '陈陌已经死了。10月15日22:10。之后给你的所有消息都是别人用他的手机发的。' },
    { type: 'normal', text: '苏晓——真正的苏晓——也许在走进古堡的那一刻就已经不在了。或者说，被白雪"替换"了。你不知道"替换"是什么意思，但你知道那不会是什么好事。' },
    { type: 'clue', text: '白雪的日记（完整版）——揭示永生之画的原理：画师可以将人的灵魂固定在画布中。白雪在等一个有绘画天赋的人来替她完成自画像。陈陌在22:10已被画入画中，苏晓在路上被白雪附身，所有消息都是白雪用苏晓的手机发送的。' },

    { type: 'dialogue', cls: 'baixue', speaker: '白雪', text: '"画完之后，这座古堡里所有困在画中的人都可以自由了。包括陈陌。包括苏晓。包括林晚。他们不会被消灭——只是被困住了。一旦我进入画中，维持这个‘牢笼’的力量就会消失。所有人都会醒来。"' },
    { type: 'dialogue', cls: 'chenmo', speaker: '你', text: '"你说的是真的？"' },
    { type: 'dialogue', cls: 'baixue', speaker: '白雪', text: '"你可以选择不信我。但我在这里等了七十七年——我没有理由骗你。骗一个愿意来替我画画的人，对我来说没有任何好处。"' },
    { type: 'narration', text: '她转过身来面对你。烛光在她的眼睛里跳动。你注意到她的眼角有一点湿润——也许是烛火的烟熏的，也许不是。' },
    { type: 'dialogue', cls: 'baixue', speaker: '白雪', text: '"你可以选择。替我画完——我会进入画中，所有人都会自由，而你也可以离开。或者……拒绝。"' },
    { type: 'dialogue', cls: 'baixue', speaker: '白雪', text: '"但如果你拒绝的话，我只能继续等。也许再等七十七年。也许永远。这座古堡里的人，会继续困在画里。陈陌会继续困惑。林晚会继续在地下室发抖。苏晓会继续沉睡。"' },
    { type: 'dialogue', cls: 'baixue', speaker: '白雪', text: '"或者……你可以留下来。不画画。就只是留下来。陪我。"' },
    { type: 'narration', text: '她的声音在最后一个选择上变得很轻，像是在小心翼翼地试探什么。你注意到她的手指在微微发抖。七十七年的孤独，浓缩在这一句话里。' }
